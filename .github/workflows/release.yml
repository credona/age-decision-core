name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify-release:
    name: Verify release metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Check release metadata
        run: python scripts/metadata/check_release_metadata.py

      - name: Sync compatibility metadata
        run: |
          python scripts/metadata/sync_compatibility_metadata.py
          git diff --exit-code compatibility.json

      - name: Check metadata
        run: |
          python scripts/metadata/check_project_metadata.py
          python scripts/metadata/check_compatibility_metadata.py
          python scripts/metadata/check_docker_metadata.py

      - name: Check generated documentation
        run: |
          python scripts/docs/update_readme_examples.py
          git diff --exit-code README.md

          python scripts/docs/update_docs_usage.py
          git diff --exit-code docs/usage.md

          python scripts/docs/update_docs_compatibility.py
          git diff --exit-code docs/compatibility.md

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [verify-release]

    steps:
      - uses: actions/checkout@v6

      - name: Generate release notes from changelog
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          version = json.loads(Path("project.json").read_text(encoding="utf-8"))["version"]
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          start_marker = f"<h2>{version}</h2>"
          start = changelog.find(start_marker)
          if start == -1:
              raise SystemExit(f"Missing changelog section for version {version}")
          end = changelog.find("<hr>", start)
          if end == -1:
              end = len(changelog)
          section = changelog[start:end].strip()
          Path("RELEASE_NOTES.md").write_text(
              f"## {version}\n\n{section}\n",
              encoding="utf-8",
          )
          PY

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
