name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: read

jobs:
  verify-release:
    name: Verify release metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Check release metadata
        run: python scripts/metadata/check_release_metadata.py

      - name: Sync compatibility metadata
        run: |
          python scripts/metadata/sync_compatibility_metadata.py
          git diff --exit-code compatibility.json

      - name: Check metadata
        run: |
          python scripts/metadata/check_project_metadata.py
          python scripts/metadata/check_compatibility_metadata.py
          python scripts/metadata/check_docker_metadata.py

      - name: Validate Docker image tag for release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import json
          import urllib.parse
          import urllib.request

          owner = "credona"
          package_name = "age-decision-core"
          release_tag = __import__("os").environ["RELEASE_TAG"]

          with open("project.json", "r", encoding="utf-8") as f:
              project_version = json.load(f)["version"]

          expected_tag = f"v{project_version}"
          if release_tag != expected_tag:
              raise SystemExit(
                  f"Release tag '{release_tag}' does not match project.json version '{project_version}'"
              )

          token = __import__("os").environ["GITHUB_TOKEN"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          encoded = urllib.parse.quote(package_name, safe="")
          base = (
              f"https://api.github.com/orgs/{owner}/packages/container/"
              f"{encoded}/versions?per_page=100"
          )

          url = base
          tagged_count = 0

          while url:
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = resp.read().decode("utf-8")
                  versions = json.loads(body)
                  link = resp.headers.get("Link", "")

              for version in versions:
                  tags = version.get("metadata", {}).get("container", {}).get("tags", [])
                  if release_tag in tags:
                      tagged_count += 1

              next_url = None
              for part in link.split(","):
                  part = part.strip()
                  if 'rel="next"' in part:
                      next_url = part[part.find("<") + 1 : part.find(">")]
                      break
              url = next_url

          if tagged_count != 1:
              raise SystemExit(
                  f"Expected exactly one GHCR version tagged '{release_tag}', found {tagged_count}"
              )
          PY

      - name: Check generated documentation
        run: |
          python scripts/docs/update_readme_examples.py
          git diff --exit-code README.md

          python scripts/docs/update_docs_usage.py
          git diff --exit-code docs/usage.md

          python scripts/docs/update_docs_compatibility.py
          git diff --exit-code docs/compatibility.md

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [verify-release]

    steps:
      - uses: actions/checkout@v6

      - name: Generate release notes from changelog
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          version = json.loads(Path("project.json").read_text(encoding="utf-8"))["version"]
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          start_marker = f"<h2>{version}</h2>"
          start = changelog.find(start_marker)
          if start == -1:
              raise SystemExit(f"Missing changelog section for version {version}")
          end = changelog.find("<hr>", start)
          if end == -1:
              end = len(changelog)
          section = changelog[start:end].strip()
          Path("RELEASE_NOTES.md").write_text(
              f"## {version}\n\n{section}\n",
              encoding="utf-8",
          )
          PY

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
