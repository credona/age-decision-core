name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run quality checks
        run: |
          ruff check .
          ruff format --check .
          python -m compileall app tests scripts

      - name: Check trailing whitespace
        run: |
          if grep -rIn "[[:blank:]]$" app tests scripts docs README.md CHANGELOG.md CONTRIBUTING.md; then
            echo "Trailing whitespace found"
            exit 1
          fi

      - name: Check final newline
        run: |
          FAILED=0

          for file in $(find app tests scripts docs -type f \( -name "*.py" -o -name "*.md" -o -name "*.sh" \)); do
            if [ -s "$file" ] && [ "$(tail -c1 "$file")" != "" ]; then
              echo "Missing final newline: $file"
              FAILED=1
            fi
          done

          for file in README.md CHANGELOG.md CONTRIBUTING.md pyproject.toml project.json compatibility.json Dockerfile Dockerfile.dev docker-compose.dev.yml; do
            if [ -f "$file" ] && [ -s "$file" ] && [ "$(tail -c1 "$file")" != "" ]; then
              echo "Missing final newline: $file"
              FAILED=1
            fi
          done

          exit "$FAILED"

  metadata:
    name: Metadata and generated docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Sync compatibility metadata
        run: |
          python scripts/metadata/sync_compatibility_metadata.py
          git diff --exit-code compatibility.json

      - name: Check metadata
        run: |
          python scripts/metadata/check_project_metadata.py
          python scripts/metadata/check_compatibility_metadata.py
          python scripts/metadata/check_docker_metadata.py

      - name: Check generated documentation
        run: |
          python scripts/docs/update_readme_examples.py
          git diff --exit-code README.md

          python scripts/docs/update_docs_usage.py
          git diff --exit-code docs/usage.md

          python scripts/docs/update_docs_compatibility.py
          git diff --exit-code docs/compatibility.md

          python scripts/docs/update_changelog_release_section.py
          git diff --exit-code CHANGELOG.md

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-0 libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements.dev.txt

      - name: Download model files
        run: python scripts/models/download_models.py

      - name: Run tests
        run: pytest

  docker-runtime:
    name: Docker runtime
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Generate Docker build metadata
        id: project
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          data = json.load(open("project.json"))
          docker = data["docker"]["prod"]

          print(f"version={data['version']}")
          print(f"repository={data['repository']}")
          print(f"license={data['license']}")
          print(f"dockerfile={docker['dockerfile']}")
          print(f"image={docker['image']}")
          print(f"title={docker['title']}")
          print(f"description={docker['description']}")
          PY

      - name: Build Docker image
        run: |
          docker build \
            -f "${{ steps.project.outputs.dockerfile }}" \
            --build-arg VERSION="${{ steps.project.outputs.version }}" \
            --build-arg REPOSITORY="${{ steps.project.outputs.repository }}" \
            --build-arg TITLE="${{ steps.project.outputs.title }}" \
            --build-arg DESCRIPTION="${{ steps.project.outputs.description }}" \
            --build-arg LICENSE="${{ steps.project.outputs.license }}" \
            -t age-decision-core:ci .

      - name: Create model volume
        run: docker volume create core-models-ci

      - name: Download models into volume
        run: |
          docker run --rm \
            -v core-models-ci:/app/models \
            age-decision-core:ci \
            python scripts/models/download_models.py

      - name: Run Docker container
        run: |
          docker run -d \
            --name age-decision-core \
            -p 8000:8000 \
            -v core-models-ci:/app/models \
            age-decision-core:ci

      - name: Wait for service
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi

            echo "Waiting for age-decision-core... attempt $i"
            docker logs age-decision-core || true
            sleep 2
          done

          docker logs age-decision-core || true
          docker ps -a
          exit 1

      - name: Check runtime endpoints
        run: |
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8000/version
          curl -fsS http://localhost:8000/engine/status

      - name: Cleanup Docker resources
        if: always()
        run: |
          docker rm -f age-decision-core || true
          docker volume rm core-models-ci || true

  auto-tag:
    name: Automatic release tag
    runs-on: ubuntu-latest
    needs:
      - quality
      - metadata
      - tests
      - docker-runtime
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Create tag from project metadata
        env:
          AGE_DECISION_RELEASE_TOKEN: ${{ secrets.AGE_DECISION_RELEASE_TOKEN }}
        run: python scripts/release/create_tag_from_project.py
