name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Check trailing whitespace
        run: |
          if grep -rIn "[[:blank:]]$" app tests scripts docs README.md CHANGELOG.md CONTRIBUTING.md; then
            echo "Trailing whitespace found"
            exit 1
          fi

      - name: Check final newline
        run: |
          FAILED=0

          for file in $(find app tests scripts docs -type f \( -name "*.py" -o -name "*.md" -o -name "*.sh" \)); do
            if [ -s "$file" ]; then
              if [ "$(tail -c1 "$file")" != "" ]; then
                echo "Missing final newline: $file"
                FAILED=1
              fi
            fi
          done

          for file in README.md CHANGELOG.md CONTRIBUTING.md pyproject.toml project.json compatibility.json; do
            if [ -f "$file" ] && [ -s "$file" ]; then
              if [ "$(tail -c1 "$file")" != "" ]; then
                echo "Missing final newline: $file"
                FAILED=1
              fi
            fi
          done

          exit $FAILED

      - name: Compile Python files
        run: python -m compileall app tests scripts

  metadata:
    name: Metadata and generated docs
    runs-on: ubuntu-latest
    needs: [quality]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check project metadata
        run: python scripts/metadata/check_project_metadata.py

      - name: Check compatibility metadata
        run: python scripts/metadata/check_compatibility_metadata.py

      - name: Check generated README examples
        run: |
          python scripts/docs/update_readme_examples.py
          git diff --exit-code README.md

      - name: Check generated usage examples
        run: |
          python scripts/docs/update_docs_usage.py
          git diff --exit-code docs/usage.md

      - name: Check generated compatibility documentation
        run: |
          python scripts/docs/update_docs_compatibility.py
          git diff --exit-code docs/compatibility.md

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: [metadata]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-0 libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model files
        run: python scripts/models/download_models.py

      - name: Run tests
        run: pytest

  compatibility:
    name: Contract compatibility
    runs-on: ubuntu-latest
    needs: [tests]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-0 libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model files
        run: python scripts/models/download_models.py

      - name: Run contract tests
        run: pytest tests/unit/contract

      - name: Run privacy and proof tests
        run: |
          pytest tests/unit/domain/test_privacy.py
          pytest tests/unit/domain/test_proof.py
          pytest tests/integration/test_privacy_response.py

  docker-runtime:
    name: Docker runtime
    runs-on: ubuntu-latest
    needs: [compatibility]

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t age-decision-core:ci .

      - name: Create model volume
        run: docker volume create core-models-ci

      - name: Download models into volume
        run: |
          docker run --rm \
            -v core-models-ci:/app/models \
            age-decision-core:ci \
            python scripts/models/download_models.py

      - name: Verify models exist in volume
        run: |
          docker run --rm \
            -v core-models-ci:/app/models \
            age-decision-core:ci \
            test -f /app/models/face_detection/face_detection_yunet_2023mar.onnx

          docker run --rm \
            -v core-models-ci:/app/models \
            age-decision-core:ci \
            test -f /app/models/age_estimation/age-gender-prediction-ONNX.onnx

      - name: Run Docker container
        run: |
          docker run -d \
            --name age-decision-core \
            -p 8000:8000 \
            -v core-models-ci:/app/models \
            age-decision-core:ci

      - name: Wait for service
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi

            echo "Waiting for age-decision-core... attempt $i"
            docker logs age-decision-core || true
            sleep 2
          done

          echo "Service did not become ready"
          docker logs age-decision-core || true
          docker ps -a
          exit 1

      - name: Check runtime endpoints
        run: |
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8000/version
          curl -fsS http://localhost:8000/model/status

      - name: Cleanup Docker resources
        if: always()
        run: |
          docker rm -f age-decision-core || true
          docker volume rm core-models-ci || true

  auto-tag:
    name: Automatic release tag
    runs-on: ubuntu-latest
    needs: [docker-runtime]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create tag from project metadata
        env:
          AGE_DECISION_RELEASE_TOKEN: ${{ secrets.AGE_DECISION_RELEASE_TOKEN }}
        run: python scripts/release/create_tag_from_project.py
