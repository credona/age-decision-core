name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Extract project metadata
        id: project
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          data = json.load(open("project.json"))
          docker = data["docker"]["prod"]

          print(f"version={data['version']}")
          print(f"repository={data['repository']}")
          print(f"license={data['license']}")
          print(f"dockerfile={docker['dockerfile']}")
          print(f"title={docker['title']}")
          print(f"description={docker['description']}")
          PY

      - uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/credona/age-decision-core
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ steps.project.outputs.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.project.outputs.version }}
            REPOSITORY=${{ steps.project.outputs.repository }}
            TITLE=${{ steps.project.outputs.title }}
            DESCRIPTION=${{ steps.project.outputs.description }}
            LICENSE=${{ steps.project.outputs.license }}
