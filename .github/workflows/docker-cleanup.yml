name: Docker Cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, only print candidates without deleting"
        required: false
        default: true
        type: boolean

permissions:
  packages: write

jobs:
  cleanup-untagged:
    name: Safely cleanup untagged GHCR versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Conservative GHCR cleanup (default dry-run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: credona
          PACKAGE_NAME: age-decision-core
          DRY_RUN: ${{ inputs.dry_run }}
        run: python scripts/ghcr/safe_cleanup_untagged.py
