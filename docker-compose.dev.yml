services:
  age-decision-core:
    build:
      context: .
      dockerfile: ${AGE_DECISION_CORE_DOCKERFILE}
      args:
        VERSION: ${AGE_DECISION_CORE_VERSION}
        REPOSITORY: ${AGE_DECISION_CORE_REPOSITORY}
        TITLE: ${AGE_DECISION_CORE_TITLE}
        DESCRIPTION: ${AGE_DECISION_CORE_DESCRIPTION}
        LICENSE: ${AGE_DECISION_CORE_LICENSE}
    image: ${AGE_DECISION_CORE_IMAGE}:${AGE_DECISION_CORE_VERSION}
    container_name: age-decision-core
    ports:
      - "${CORE_PORT}:8000"
    volumes:
      - .:/app
      - ./models:/app/models
    env_file:
      - .generated/runtime/dev.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - age-decision-network

networks:
  age-decision-network:
    external: true
